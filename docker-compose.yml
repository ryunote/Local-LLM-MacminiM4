services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"
    volumes:
      - /Users/ryunote/Code/llama/history:/app/backend/data
      # (追加) imagesフォルダを無視設定にしたのでマウントしておく
      - /Users/ryunote/Code/llama/images:/app/backend/static/images
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENABLE_RAG_WEB_SEARCH=True
      - ENABLE_SEARCH_QUERY=True
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://host.docker.internal:9090/search?q=<query>
      - ENABLE_WEB_SEARCH=True
      # --- (追加) 画像生成 (ComfyUI) の設定 ---
      - ENABLE_IMAGE_GENERATION=True
      - IMAGE_GENERATION_ENGINE=comfyui
      - COMFYUI_BASE_URL=http://host.docker.internal:8188
    extra_hosts:
      - "host.docker.internal:host-gateway"

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: always
    ports:
      - "9090:8080"
    volumes:
      - /Users/ryunote/Code/llama/searxng_settings.yml:/etc/searxng/settings.yml:ro